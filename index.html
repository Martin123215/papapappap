<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STF</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

    <!-- MENU -->
    <aside class="sidebar">

        <div class="logo">

            <h1>STF</h1>

            <span>
                Sistema Inventario
            </span>

        </div>

        <button onclick="mostrarSeccion('almacenes')">
            🏢 Almacenes
        </button>

        <button onclick="mostrarSeccion('inventario')">
            📦 Inventario
        </button>

        <button onclick="mostrarSeccion('precios')">
            💰 Precios
        </button>

        <button onclick="mostrarSeccion('estadisticas')">
            📊 Estadísticas
        </button>

    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <!-- ALMACENES -->
        <section id="almacenes" class="section">

            <h2>
                🏢 Almacenes
            </h2>

            <div class="create-card">

                <input
                    type="text"
                    id="nombreAlmacen"
                    placeholder="Nombre del almacén"
                >

                <button id="btnCrearAlmacen">
                    ➕ Crear almacén
                </button>

            </div>

            <div id="listaAlmacenes"></div>

        </section>

        <!-- INVENTARIO -->
        <section
            id="inventario"
            class="section"
            style="display:none;"
        >

            <h2>
                📦 Inventario
            </h2>

            <h3 id="tituloInventario">
                Selecciona un almacén
            </h3>

            <div id="inventarioContenido"></div>

        </section>

        <!-- PRECIOS -->
        <section
            id="precios"
            class="section"
            style="display:none;"
        >

            <h2>
                💰 Precios
            </h2>

            <div id="listaPrecios"></div>

        </section>

        <!-- ESTADISTICAS -->
        <section
            id="estadisticas"
            class="section"
            style="display:none;"
        >

            <h2>
                📊 Estadísticas
            </h2>

            <div id="estadisticasContenido"></div>

        </section>

    </main>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
