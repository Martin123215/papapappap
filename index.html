<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SUPPLIER PRO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>📦 THE SUPPLIER PRO</h1>
</header>

<main>

<section class="panel">

  <form id="formAddProduct">

    <input id="depositoInput" type="text" placeholder="Depósito">
    <input id="articuloInput" type="text" placeholder="Artículo">
    <input id="cantidadInput" type="number" placeholder="Cantidad">

    <button type="submit">➕ Agregar</button>

  </form>

  <input id="filterInput" type="text" placeholder="Buscar artículo...">

  <div id="depositTabs"></div>
  <div id="stockContainer"></div>

</section>

</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
