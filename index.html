<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Inventario</h1>

  <nav>
    <button data-target="stockView" class="selected">Stock</button>
    <button data-target="inventorySummary">Resumen</button>
  </nav>
</header>

<main>

<section id="stockView" class="visible">

  <h2>Registrar Producto</h2>

  <form id="formAddProduct">

    <label>Depósito</label>
    <input type="text" id="depositoInput" required>

    <label>Artículo</label>
    <input type="text" id="articuloInput" required>

    <label>Cantidad</label>
    <input type="number" id="cantidadInput" min="1" required>

    <button type="submit">Guardar</button>

  </form>

  <br>

  <label>Buscar artículo</label>
  <input type="text" id="filterInput">

  <div id="stockContainer"></div>

</section>

<section id="inventorySummary">

  <h2>Resumen</h2>

  <div id="summaryContainer"></div>

</section>

</main>

<script type="module" src="script.js"></script>

</body>
</html>
