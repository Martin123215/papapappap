<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE SUPPLIER</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>THE SUPPLIER</h1>
</header>

<main>

    <h2>Inventario</h2>

    <form id="formAddProduct">

        <input
            type="text"
            id="depositoInput"
            placeholder="Depósito"
            required
        >

        <input
            type="text"
            id="articuloInput"
            placeholder="Artículo"
            required
        >

        <input
            type="number"
            id="cantidadInput"
            placeholder="Cantidad"
            required
        >

        <button type="submit">
            Guardar
        </button>

    </form>

    <input
        type="text"
        id="filterInput"
        placeholder="Buscar artículo..."
    >

    <div id="depositTabs"></div>
    <div id="stockContainer"></div>

</main>

<script type="module" src="firebase.js"></script>
<script type="module" src="script.js"></script>

</body>
</html>
